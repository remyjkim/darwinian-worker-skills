name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Lint markdown
        run: npm run lint:md

      - name: Check identity metadata
        run: npm run check:identity

      - name: Validate skills
        run: npm run validate:skills

      - name: Check card-bundled skills
        run: npm run sync:cards -- --check
